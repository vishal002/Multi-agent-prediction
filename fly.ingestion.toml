# Fly.io — ingestion FastAPI. Deploy from repository root:
#   fly apps create <your-ingestion-app-name>
#   fly secrets set CRICAPI_KEY=...   # optional
#   fly deploy --config fly.ingestion.toml --app <your-ingestion-app-name>

app = "cricket-war-room-ingestion"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.python"

[processes]
  app = "uvicorn ingestion_service.app:app --host 0.0.0.0 --port 8080"

[env]
  INGESTION_CACHE_TTL_SEC = "900"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "45s"
  method = "GET"
  path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
