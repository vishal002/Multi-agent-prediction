## Render Blueprint — AI Cricket War Room
## Deploy: https://dashboard.render.com/select-repo → "Use existing render.yaml"
##
## Services:
##   1. cricket-war-room   — Node.js main server (UI + LLM proxy)  [required]
##   2. cricket-ingestion  — Python FastAPI, RSS/CricAPI data       [optional]
##   3. cricket-judge      — Python FastAPI, prediction + accuracy  [optional]
##
## After deploy, set these env vars in the Render dashboard:
##   cricket-war-room:   GROQ_API_KEY (or ANTHROPIC_API_KEY)
##                       INGESTION_SERVICE_URL  → https://cricket-ingestion.onrender.com
##                       JUDGE_SERVICE_URL      → https://cricket-judge.onrender.com
##                       Optional: WAR_ROOM_API_SECRET, JUDGE_SERVICE_SECRET (same on web+judge),
##                       TRUST_PROXY=1 for rate limits behind Render proxy
##   cricket-ingestion:  CRICAPI_KEY (optional — free tier at cricapi.com)
##   cricket-judge:      GROQ_API_KEY or ANTHROPIC_API_KEY, optional JUDGE_SERVICE_SECRET

services:
  # ── 1. Main web service (Node.js) ────────────────────────────────────────────
  - type: web
    name: cricket-war-room
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: node server.mjs
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      # Required — set at least one LLM key in the dashboard
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Optional — force provider ("groq" or "anthropic")
      - key: LLM_PROVIDER
        sync: false
      # Optional — set these to the URLs of the Python services below
      - key: INGESTION_SERVICE_URL
        sync: false
      - key: JUDGE_SERVICE_URL
        sync: false
      - key: WAR_ROOM_API_SECRET
        sync: false
      - key: JUDGE_SERVICE_SECRET
        sync: false
      - key: TRUST_PROXY
        sync: false

  # ── 2. Ingestion service (Python) — optional ──────────────────────────────────
  - type: web
    name: cricket-ingestion
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-ingestion.txt
    startCommand: uvicorn ingestion_service.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      # Optional — free tier at cricapi.com for live scores
      - key: CRICAPI_KEY
        sync: false
      - key: INGESTION_CACHE_TTL_SEC
        value: "900"

  # ── 3. Judge service (Python) — optional ─────────────────────────────────────
  - type: web
    name: cricket-judge
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-judge.txt
    startCommand: uvicorn judge_service.app:app --host 0.0.0.0 --port $PORT
    envVars:
      # Required for judge — set at least one LLM key
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # SQLite DB path — /tmp is writable on Render free tier
      # Note: data resets on restart/redeploy on free tier (no persistent disk)
      - key: WAR_ROOM_DB_PATH
        value: /tmp/war_room.db
      # Optional — persistent predictions on Turso (overrides ephemeral /tmp SQLite)
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: JUDGE_SERVICE_SECRET
        sync: false
