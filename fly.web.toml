# Fly.io — Node web (root Dockerfile). Deploy from repository root:
#   fly apps create <your-web-app-name>
#   fly secrets set GROQ_API_KEY=...   # and/or ANTHROPIC_API_KEY, etc.
#   fly deploy --config fly.web.toml --app <your-web-app-name>
#
# Replace `app` with the same name, or pass --app on each command.

app = "cricket-war-room-web"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  SERVE_DIST = "1"
  TRUST_PROXY = "1"

[http_service]
  internal_port = 3333
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "45s"
  method = "GET"
  path = "/"

[[vm]]
  size = "shared-cpu-1x"
