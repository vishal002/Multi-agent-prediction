# Fly.io — Judge FastAPI + SQLite on a volume, or Turso via secrets.
# Deploy from repository root:
#   fly apps create <your-judge-app-name>
#   fly volumes create war_room_judge_data --region iad --size 1
#   fly secrets set GROQ_API_KEY=...   # and/or ANTHROPIC_API_KEY; optional JUDGE_SERVICE_SECRET
#   fly deploy --config fly.judge.toml --app <your-judge-app-name>
#
# With Turso: fly secrets set TURSO_DATABASE_URL=... TURSO_AUTH_TOKEN=...
# You can remove the [mounts] block if you rely entirely on Turso.

app = "cricket-war-room-judge"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.python"

[processes]
  app = "uvicorn judge_service.app:app --host 0.0.0.0 --port 8080"

[env]
  WAR_ROOM_DB_PATH = "/data/war_room.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "45s"
  method = "GET"
  path = "/openapi.json"

[mounts]
  source = "war_room_judge_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
